name: Deploy payrald-core

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy CF Worker → core.pay.rald.cloud
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck 2>/dev/null || true

      - name: Install Wrangler globally
        run: npm install -g wrangler@latest

      - name: Deploy Worker (custom domain provisions SSL automatically)
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Provision Worker secrets
        run: |
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | wrangler secret put SUPABASE_SERVICE_ROLE_KEY
          echo "${{ secrets.RALD_JWT_SECRET }}" | wrangler secret put RALD_JWT_SECRET
          echo "${{ secrets.SESSION_SECRET }}" | wrangler secret put MACHINE_IDENTITY_SECRET
          echo "${{ secrets.SQUADCO_SECRET_KEYS }}" | wrangler secret put SQUADCO_SECRET_KEYS
          echo "${{ secrets.SQUADCO_PUBLIC_KEY }}" | wrangler secret put SQUADCO_PUBLIC_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
