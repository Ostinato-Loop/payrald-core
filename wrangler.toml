name = "payrald-core"
main = "src/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT      = "production"
SQUAD_ENV        = "production"
ROUTING_URL      = "https://routing.rald.cloud"
EVENT_BUS_URL    = "https://events.rald.cloud"
SUPABASE_URL     = "https://onxdcikfttdmnhofsuwo.supabase.co"
PAYRALD_BANK_CODE = "035"

[[routes]]
pattern = "core.pay.rald.cloud/*"
zone_name = "rald.cloud"

[observability]
enabled = true
head_sampling_rate = 1

# ── Secrets — wrangler secret put <KEY> ────────────────────────────────────────
# SUPABASE_SERVICE_ROLE_KEY   — Supabase service role key
# RALD_JWT_SECRET             — Shared HMAC-SHA256 key (same across org)
# MACHINE_IDENTITY_SECRET     — Machine-to-machine shared secret
# SQUADCO_SECRET_KEYS         — Squad Co secret key (sk_live_...)
# SQUADCO_PUBLIC_KEY          — Squad Co public key (pk_live_...)
